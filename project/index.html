<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="120" rx="22" fill="#0A2540"/><g transform="translate(34,46) scale(0.18)"><path d="M160.449 70.5976L131.568 3.20898H105.896V131.568H131.568L160.449 70.5976Z" fill="#FFEFE2"/><path d="M93.0605 70.5977V3.20898H54.5527V131.568H93.0605V70.5977Z" fill="#FFEFE2"/><path d="M41.7168 70.5977V3.20898H3.20898V131.568H41.7168V70.5977Z" fill="#FFEFE2"/><path d="M215.002 67.3887L141.195 131.568H189.33L215.002 98.0016L240.674 131.568H288.809L240.674 67.3887L288.809 3.20898H234.256L215.002 38.5078L189.33 3.20898H141.195L215.002 67.3887Z" fill="#FF6E00"/></g></svg>

  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Site.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Reservar.jsx"></script>
  <script type="text/babel">
    const { useState, useCallback } = React;

    function App() {
      const [wiz, setWiz] = useState({ open: false, size: null });
      const openReserve = useCallback((opts = {}) => setWiz({ open: true, size: opts.size || null }), []);
      const closeReserve = useCallback(() => setWiz((w) => ({ ...w, open: false })), []);

      return (
        <React.Fragment>
          <Nav onReserve={openReserve} />
          <main>
            <Hero onReserve={openReserve} />
            <Ticker />
            <ComoFunciona onReserve={openReserve} />
            <Pricing onReserve={openReserve} />
            <Sobre />
            <Contato />
          </main>
          <Footer onReserve={openReserve} />
          <Reservar open={wiz.open} initialSize={wiz.size} onClose={closeReserve} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
